{% extends "base.html" %}

{% block title %}Add Expense — Spendly{% endblock %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/add-expense.css') }}">
{% endblock %}

{% block content %}

<section class="add-expense-section">
    <div class="add-expense-inner">

        <div class="add-expense-card">
            <h1 class="add-expense-title">Add Expense</h1>
            <p class="add-expense-subtitle">Record a new transaction</p>

            {% if error %}
            <div class="auth-error">{{ error }}</div>
            {% endif %}

            <form method="POST" action="{{ url_for('add_expense') }}">
                <div class="form-group">
                    <label for="amount">Amount</label>
                    <input type="number" class="form-input" id="amount" name="amount"
                           step="0.01" min="0" placeholder="0.00" required
                           value="{{ request.form.get('amount', '') }}">
                </div>

                <div class="form-group">
                    <label for="category">Category</label>
                    <select class="form-input" id="category" name="category" required>
                        <option value="" disabled {% if not request.form.get('category') %}selected{% endif %}>
                            Select a category
                        </option>
                        {% for cat in categories %}
                        <option value="{{ cat }}"
                                {% if request.form.get('category') == cat %}selected{% endif %}>
                            {{ cat }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" class="form-input" id="date" name="date" required
                           value="{{ request.form.get('date', today) }}">
                </div>

                <div class="form-group">
                    <label for="description">Description <span class="label-optional">(optional)</span></label>
                    <input type="text" class="form-input" id="description" name="description"
                           placeholder="What was this for?"
                           value="{{ request.form.get('description', '') }}">
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-submit">Save Expense</button>
                    <a href="{{ url_for('profile') }}" class="btn-ghost">Cancel</a>
                </div>
            </form>
        </div>

    </div>
</section>

{% endblock %}
